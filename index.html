<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TimePlanner.AI</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --card-hover: #fcfcfd;
    --border: #ececec;
    --border-strong: #d4d4d4;
    --text: #1a1a1a;
    --muted: #6b7280;
    --subtle: #f3f4f6;
    --accent: #2563eb;
    --accent-soft: #eff6ff;
    --accent-hover: #1d4ed8;
    --danger: #b91c1c;
    --danger-soft: #fef2f2;
    --warn: #ca8a04;
    --ok: #16a34a;
    --planning: #9ca3af;
    --active: #16a34a;
    --hold: #ca8a04;
    --done: #6b7280;
    --radius: 8px;
    --radius-lg: 12px;
    --t-fast: 140ms;
    --t-base: 220ms;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.25rem 1.25rem 4rem;
  }

  /* header */
  header.app { margin-bottom: 1.25rem; }
  .brand-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 0.4rem;
  }
  .brand {
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    text-decoration: none;
    cursor: pointer;
    transition: opacity var(--t-fast) var(--ease);
  }
  .brand:hover { opacity: 0.65; }
  .header-right {
    display: flex; align-items: baseline; gap: 0.85rem;
  }
  .header-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.18rem 0.6rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #fff;
    transition: color var(--t-fast) var(--ease),
                background var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                transform var(--t-fast) var(--ease);
  }
  .header-link:hover { color: var(--text); background: var(--subtle); border-color: var(--border-strong); }
  .header-link:active { transform: scale(0.96); }
  .header-link.active {
    color: var(--accent);
    border-color: #dbeafe;
    background: var(--accent-soft);
  }
  .date {
    color: var(--muted);
    font-size: 0.85rem;
  }
  .crumbs {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.35rem;
    color: var(--muted);
    font-size: 0.88rem;
    min-height: 1.5rem;
  }
  .crumbs a {
    color: var(--muted);
    text-decoration: none;
    border-radius: 4px;
    padding: 0.1rem 0.35rem;
    margin: 0 -0.35rem;
    transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
  }
  .crumbs a:hover { color: var(--text); background: var(--subtle); }
  .crumbs .sep { color: var(--border-strong); }
  .crumbs .current { color: var(--text); font-weight: 500; }

  /* running bar */
  .running-bar {
    margin-top: 0.75rem;
    background: var(--accent-soft);
    border: 1px solid #dbeafe;
    border-radius: var(--radius);
    padding: 0.55rem 0.75rem 0.55rem 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.65rem;
    font-size: 0.9rem;
    animation: fadeUp var(--t-base) var(--ease);
  }
  .running-bar .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    animation: pulseRing 1.6s ease-out infinite;
  }
  .running-bar .label { flex: 1; color: var(--text); }
  .running-bar .label .sub { color: var(--muted); }
  .running-bar .live {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    color: var(--accent);
  }
  .running-bar .stop-btn {
    background: #fff;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    font-size: 0.85rem;
    transition: background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
  }
  .running-bar .stop-btn:hover { background: #dbeafe; }
  .running-bar .stop-btn:active { transform: scale(0.97); }

  /* main view container */
  main { position: relative; }
  .view {
    animation: fadeUp var(--t-base) var(--ease);
  }
  .view.leaving { animation: fadeDown var(--t-fast) var(--ease) forwards; }

  /* sections */
  section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.15rem 0.9rem;
    margin-bottom: 1.1rem;
    transition: border-color var(--t-fast) var(--ease);
  }
  section h2 {
    margin: 0 0 0.85rem;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.75rem;
    margin: 0 0 0.85rem;
  }
  .section-head h2 { margin: 0; }
  .section-head .head-meta {
    color: var(--muted);
    font-size: 0.8rem;
  }
  .empty {
    color: var(--muted);
    font-size: 0.9rem;
    padding: 0.4rem 0 0.6rem;
  }

  /* hero (portfolio / project header) */
  .hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.25rem 1.1rem;
    margin-bottom: 1.1rem;
    animation: fadeUp var(--t-base) var(--ease);
  }
  .hero-top {
    display: flex;
    align-items: flex-start;
    gap: 0.85rem;
    margin-bottom: 0.5rem;
  }
  .hero .dot-lg {
    width: 14px; height: 14px;
    border-radius: 50%;
    margin-top: 0.45rem;
    flex-shrink: 0;
  }
  .hero h1 {
    margin: 0;
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    flex: 1;
    cursor: pointer;
    border-radius: 4px;
    padding: 0.05rem 0.3rem;
    margin-left: -0.3rem;
    transition: background var(--t-fast) var(--ease);
  }
  .hero h1:hover { background: var(--subtle); }
  .hero .hero-actions { display: flex; gap: 0.25rem; }
  .hero .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.65rem 1rem;
    margin-top: 0.35rem;
    color: var(--muted);
    font-size: 0.88rem;
    align-items: center;
  }
  .hero .desc {
    margin-top: 0.7rem;
    color: var(--text);
    font-size: 0.92rem;
    white-space: pre-wrap;
    line-height: 1.55;
  }
  .hero .desc.empty-desc {
    color: var(--muted);
    font-style: italic;
    cursor: pointer;
  }
  .hero .progress-wrap {
    margin-top: 0.85rem;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
    font-variant-numeric: tabular-nums;
  }
  .progress {
    background: var(--subtle);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }
  .progress > div {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    width: 0;
    transition: width 600ms var(--ease), background var(--t-base) var(--ease);
  }
  .progress.over > div { background: var(--warn); }

  /* status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-size: 0.74rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    line-height: 1.3;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
  }
  .badge .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .badge.s-planning { color: #6b7280; }
  .badge.s-active   { color: var(--ok); border-color: #dcfce7; background: #f0fdf4; }
  .badge.s-hold     { color: var(--warn); border-color: #fef3c7; background: #fffbeb; }
  .badge.s-done     { color: #6b7280; background: var(--subtle); border-color: var(--border); }
  .due-soon { color: var(--warn); }
  .due-overdue { color: var(--danger); }

  /* generic cards (portfolios, projects) */
  .card-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 0.95rem;
    cursor: pointer;
    transition: transform var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                background var(--t-fast) var(--ease);
    animation: fadeUp var(--t-base) var(--ease) both;
    text-align: left;
    display: block;
    width: 100%;
    font: inherit;
    color: inherit;
  }
  .card:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
    background: var(--card-hover);
  }
  .card:active { transform: translateY(0); }
  .card.new-row { animation: flashIn 1200ms var(--ease); }
  .card-top {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .card .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .card .title {
    flex: 1;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card .right {
    color: var(--muted);
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  .card .sub {
    margin-top: 0.4rem;
    color: var(--muted);
    font-size: 0.83rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.85rem;
    align-items: center;
  }
  .card .mini-progress {
    margin-top: 0.55rem;
    height: 4px;
    background: var(--subtle);
    border-radius: 999px;
    overflow: hidden;
  }
  .card .mini-progress > div {
    height: 100%; width: 0;
    background: var(--accent);
    border-radius: 999px;
    transition: width 600ms var(--ease);
  }

  /* activities (project view) */
  .activity {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 0;
    border-top: 1px solid var(--border);
    animation: fadeUp var(--t-base) var(--ease) both;
  }
  .activity:first-child { border-top: none; }
  .activity.new-row { animation: flashIn 1200ms var(--ease); }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .activity .name {
    flex: 1; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    cursor: pointer; border-radius: 4px;
    padding: 0.1rem 0.3rem; margin: 0 -0.3rem;
    transition: background var(--t-fast) var(--ease);
  }
  .activity .name:hover { background: var(--subtle); }
  .activity .today {
    font-variant-numeric: tabular-nums;
    color: var(--muted); font-size: 0.9rem;
    transition: color var(--t-fast) var(--ease);
  }
  .activity.running .today { color: var(--accent); font-weight: 500; }
  .activity.running .dot {
    box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.5);
    animation: pulseRing 1.6s ease-out infinite;
  }
  .activity .actions { display: flex; gap: 0.35rem; align-items: center; }
  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 0.25rem 0.4rem;
    border-radius: 6px;
    font: inherit;
    font-size: 0.85rem;
    transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
  }
  .icon-btn:hover { color: var(--text); background: var(--subtle); }
  .icon-btn:active { transform: scale(0.94); }
  .icon-btn.danger:hover { color: var(--danger); background: var(--danger-soft); }

  .add-row {
    display: flex; gap: 0.5rem;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  .add-row input { flex: 1; }

  input[type="text"], input[type="time"], input[type="date"], input[type="number"], textarea, select {
    font: inherit; color: var(--text); background: #fff;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.45rem 0.65rem; outline: none;
    transition: border-color var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease);
  }
  textarea { width: 100%; resize: vertical; min-height: 70px; font-family: inherit; }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }

  button {
    font: inherit; cursor: pointer; border-radius: 6px;
    padding: 0.45rem 0.85rem;
    border: 1px solid var(--border); background: #fff; color: var(--text);
    transition: background var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                color var(--t-fast) var(--ease),
                transform var(--t-fast) var(--ease);
  }
  button:hover { background: var(--subtle); }
  button:active { transform: scale(0.97); }
  button.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  button.stop {
    background: #fff; color: var(--accent); border-color: var(--accent);
  }
  button.stop:hover { background: var(--accent-soft); }
  button.subtle {
    background: none; border: 1px dashed var(--border);
    color: var(--muted); width: 100%; margin-top: 0.5rem;
  }
  button.subtle:hover { color: var(--text); border-color: var(--muted); background: var(--subtle); }

  /* entries */
  .entry {
    display: grid;
    grid-template-columns: 12px 1fr auto auto;
    gap: 0.75rem; align-items: center;
    padding: 0.55rem 0;
    border-top: 1px solid var(--border);
    font-size: 0.92rem;
    animation: fadeUp var(--t-base) var(--ease) both;
  }
  .entry:first-child { border-top: none; }
  .entry.new-row { animation: flashIn 1200ms var(--ease); }
  .entry .meta { color: var(--muted); font-variant-numeric: tabular-nums; }
  .entry .dur { font-variant-numeric: tabular-nums; font-weight: 500; }
  .entry .name { font-weight: 500; }
  .entry .tags {
    margin-top: 0.15rem;
    display: flex; flex-wrap: wrap; gap: 0.3rem;
  }
  .tag-chip {
    font-size: 0.72rem;
    padding: 0.05rem 0.45rem;
    border-radius: 999px;
    background: var(--subtle);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .entry-edit {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 0.5rem; align-items: center;
    padding: 0.55rem 0;
    border-top: 1px solid var(--border);
    animation: fadeUp var(--t-fast) var(--ease);
  }
  .entry-edit:first-child { border-top: none; }
  .entry-edit .row-actions { display: flex; gap: 0.35rem; }
  .entry-edit .tags-input {
    grid-column: 1 / -1;
  }
  .err {
    color: var(--danger);
    font-size: 0.82rem;
    padding: 0.35rem 0 0;
    animation: fadeUp var(--t-fast) var(--ease);
  }

  /* week chart */
  .week-row {
    display: grid;
    grid-template-columns: 12px 1fr auto;
    gap: 0.75rem; align-items: center;
    padding: 0.7rem 0;
    border-top: 1px solid var(--border);
    animation: fadeUp var(--t-base) var(--ease) both;
  }
  .week-row:first-child { border-top: none; }
  .week-row .name { font-weight: 500; }
  .week-row .bars {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px; align-items: end;
    height: 44px;
    margin-top: 4px;
  }
  .week-row .bar-col {
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    height: 100%;
  }
  .week-row .bar {
    width: 100%;
    background: var(--accent);
    border-radius: 3px 3px 0 0;
    min-height: 0;
    opacity: 0.85;
    transition: height 600ms var(--ease);
  }
  .week-row .bar.zero { background: var(--border); height: 2px !important; opacity: 1; }
  .week-row .total {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    color: var(--text);
    align-self: start;
    padding-top: 2px;
  }
  .week-grid {
    display: grid;
    grid-template-columns: 12px 1fr auto;
    gap: 0.75rem; align-items: end;
    padding: 0.25rem 0 0.5rem;
  }
  .week-grid .axis {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
  }
  .week-grid .axis .today-cell {
    color: var(--text); font-weight: 600;
  }
  .week-grid .week-label {
    color: var(--muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* project meta edit form */
  .meta-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.65rem 0.75rem;
    margin-top: 0.6rem;
    animation: fadeUp var(--t-fast) var(--ease);
  }
  .meta-form label {
    display: flex; flex-direction: column; gap: 0.2rem;
    font-size: 0.78rem; color: var(--muted);
  }
  .meta-form .full { grid-column: 1 / -1; }
  .meta-form .row-actions {
    grid-column: 1 / -1;
    display: flex; gap: 0.4rem;
    margin-top: 0.2rem;
  }

  /* animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes fadeDown {
    from { opacity: 1; transform: none; }
    to   { opacity: 0; transform: translateY(-4px); }
  }
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.45); }
    70%  { box-shadow: 0 0 0 6px rgba(37, 99, 235, 0); }
    100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
  }
  @keyframes flashIn {
    0%   { background-color: rgba(37, 99, 235, 0.10); }
    100% { background-color: transparent; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* reports — stat cards */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.55rem;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.7rem 0.85rem;
    animation: fadeUp var(--t-base) var(--ease) both;
    transition: transform var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
  }
  .stat-card:hover { transform: translateY(-1px); border-color: var(--border-strong); }
  .stat-card .label {
    font-size: 0.66rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .stat-card .value {
    font-size: 1.35rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    margin-top: 0.15rem;
    letter-spacing: -0.01em;
  }
  .stat-card .sub {
    font-size: 0.74rem;
    color: var(--muted);
    margin-top: 0.05rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* reports — horizontal bars */
  .hbar-list { display: flex; flex-direction: column; gap: 0.55rem; }
  .hbar {
    display: grid;
    grid-template-columns: 10px 1fr auto;
    gap: 0.65rem;
    align-items: center;
    animation: fadeUp var(--t-base) var(--ease) both;
    border-radius: 6px;
    padding: 0.15rem;
    margin: -0.15rem;
    transition: background var(--t-fast) var(--ease);
  }
  .hbar:hover { background: var(--subtle); }
  .hbar .label {
    font-size: 0.88rem;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .hbar .bar-wrap {
    height: 6px;
    background: var(--subtle);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 0.3rem;
  }
  .hbar .bar {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    width: 0;
    transition: width 600ms var(--ease);
  }
  .hbar .value {
    font-size: 0.82rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* reports — donut */
  .donut-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1.1rem;
    align-items: center;
  }
  .donut {

<script>
(() => {
  "use strict";

  // -------------------------------------------------------------------------
  // cloud sync configuration — fill these in with your Supabase project values
  // get them from https://supabase.com/dashboard/project/_/settings/api
  // schema:
  //   create table user_state (
  //     user_id uuid primary key references auth.users(id) on delete cascade,
  //     state jsonb not null,
  //     updated_at timestamptz default now()
  //   );
  //   alter table user_state enable row level security;
  //   create policy "own row" on user_state
  //     for all using (auth.uid() = user_id) with check (auth.uid() = user_id);
  // -------------------------------------------------------------------------
  const SUPABASE_URL = "https://gknrtzblookomnxrjthr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrbnJ0emJsb29rb21ueHJqdGhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzc5NTQsImV4cCI6MjA5NDgxMzk1NH0.8wYdRrWpgB2yVfyVKA-b1p0nUFb1oCIxtS6phaFm7zk";

  // -------------------------------------------------------------------------
  // storage & state
  // -------------------------------------------------------------------------
  const STORAGE_KEY = "timetrack.v2";
  const LEGACY_KEYS = ["timetrack.v1"];

  const PORTFOLIO_PALETTE = ["#2563eb","#7c3aed","#0891b2","#16a34a","#ca8a04","#dc2626"];
  const PROJECT_PALETTE   = ["#2563eb","#16a34a","#dc2626","#ea580c","#9333ea","#0891b2","#ca8a04","#db2777","#0d9488","#65a30d"];
  const ACTIVITY_PALETTE  = ["#2563eb","#16a34a","#dc2626","#ea580c","#9333ea","#0891b2","#ca8a04","#db2777"];

  const STATUSES = [
    { value: "planning", label: "Planning", cls: "s-planning" },
    { value: "active",   label: "Active",   cls: "s-active" },
    { value: "on-hold",  label: "On hold",  cls: "s-hold" },
    { value: "done",     label: "Done",     cls: "s-done" },
  ];
  const STATUS_BY = Object.fromEntries(STATUSES.map(s => [s.value, s]));

  const $ = (id) => document.getElementById(id);
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

  function freshState() {
    return { portfolios: [], projects: [], activities: [], entries: [] };
  }
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        // honor "wipe and start fresh": drop any legacy keys
        for (const k of LEGACY_KEYS) localStorage.removeItem(k);
        return freshState();
      }
      const s = JSON.parse(raw);
      for (const k of ["portfolios", "projects", "activities", "entries"]) {
        if (!Array.isArray(s[k])) s[k] = [];
      }
      // backfill missing tags
      for (const e of s.entries) if (!Array.isArray(e.tags)) e.tags = [];
      return s;
    } catch {
      return freshState();
    }
  }
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    cloudPush();
  }

  let state = load();
  let view = parseHash();

  // newly created ids get a brief flash on next render
  let highlightIds = new Set();
  function highlight(id) { highlightIds.add(id); }

  // -------------------------------------------------------------------------
  // time helpers
  // -------------------------------------------------------------------------
  const MS_HOUR = 3600000, MS_MIN = 60000, MS_SEC = 1000, MS_DAY = 86400000;
  const pad = (n) => String(n).padStart(2, "0");

  function fmtDuration(ms) {
    if (ms < 0) ms = 0;
    const h = Math.floor(ms / MS_HOUR);
    const m = Math.floor((ms % MS_HOUR) / MS_MIN);
    const s = Math.floor((ms % MS_MIN) / MS_SEC);
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }
  function fmtHours(ms) {
    const h = ms / MS_HOUR;
    if (h < 0.005) return "0h";
    if (h < 1) return `${Math.round(h * 60)}m`;
    return `${h.toFixed(h < 10 ? 1 : 0)}h`;
  }
  function fmtClock(iso) {
    const d = new Date(iso);
    return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  function startOfDay(d) {
    const x = new Date(d); x.setHours(0, 0, 0, 0); return x;
  }
  function startOfWeek(d) {
    const x = startOfDay(d);
    const day = (x.getDay() + 6) % 7; // Mon = 0
    x.setDate(x.getDate() - day);
    return x;
  }
  function isoToDateInput(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function dateInputToIso(dateStr) {
    const [y, mo, d] = dateStr.split("-").map(Number);
    return new Date(y, mo - 1, d, 0, 0, 0, 0).toISOString();
  }
  function combineDateTime(dateStr, timeStr) {
    const [y, mo, d] = dateStr.split("-").map(Number);
    const [h, mi] = timeStr.split(":").map(Number);
    return new Date(y, mo - 1, d, h, mi, 0, 0).toISOString();
  }
  function fmtDateLong(d) {
    return d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
  }
  function fmtDateShort(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }
  function daysUntil(iso) {
    const target = startOfDay(new Date(iso)).getTime();
    const today = startOfDay(new Date()).getTime();
    return Math.round((target - today) / MS_DAY);
  }

  // -------------------------------------------------------------------------
  // domain queries
  // -------------------------------------------------------------------------
  function getRunning() { return state.entries.find(e => e.end === null) || null; }
  function activityById(id) { return state.activities.find(a => a.id === id); }
  function projectById(id)  { return state.projects.find(p => p.id === id); }
  function portfolioById(id){ return state.portfolios.find(p => p.id === id); }
  function projectsOfPortfolio(pid) { return state.projects.filter(p => p.portfolioId === pid); }
  function activitiesOfProject(pid) { return state.activities.filter(a => a.projectId === pid); }
  function projectOfActivity(aid) {
    const a = activityById(aid); return a ? projectById(a.projectId) : null;
  }

  function entriesInRange(filterFn, fromMs, toMs) {
    return state.entries.filter(e => {
      if (filterFn && !filterFn(e)) return false;
      const s = new Date(e.start).getTime();
      return s >= fromMs && s < toMs;
    }).sort((a, b) => new Date(a.start) - new Date(b.start));
  }
  function entriesOnDay(date, filterFn) {
    const dayStart = startOfDay(date).getTime();
    return entriesInRange(filterFn, dayStart, dayStart + MS_DAY);
  }
  function totalForFilterOnDay(filterFn, date) {
    const dayStart = startOfDay(date).getTime();
    const dayEnd = dayStart + MS_DAY;
    const now = Date.now();
    let total = 0;
    for (const e of state.entries) {
      if (filterFn && !filterFn(e)) continue;
      const s = new Date(e.start).getTime();
      const en = e.end ? new Date(e.end).getTime() : now;
      const cS = Math.max(s, dayStart);
      const cE = Math.min(en, dayEnd);
      if (cE > cS) total += cE - cS;
    }
    return total;
  }
  function totalForFilterInRange(filterFn, fromMs, toMs) {
    const now = Date.now();
    let total = 0;
    for (const e of state.entries) {
      if (filterFn && !filterFn(e)) continue;
      const s = new Date(e.start).getTime();
      const en = e.end ? new Date(e.end).getTime() : now;
      const cS = Math.max(s, fromMs);
      const cE = Math.min(en, toMs);
      if (cE > cS) total += cE - cS;
    }
    return total;
  }
  function isActivityInProject(activityId, projectId) {
    const a = activityById(activityId);
    return a && a.projectId === projectId;
  }
  function isActivityInPortfolio(activityId, portfolioId) {
    const a = activityById(activityId);
    if (!a) return false;
    const p = projectById(a.projectId);
    return p && p.portfolioId === portfolioId;
  }
  function overlapsWithRunning(entry, ignoreId) {
    const r = getRunning();
    if (!r || r.id === ignoreId) return false;
    const aS = new Date(entry.start).getTime();
    const aE = new Date(entry.end).getTime();
    const rS = new Date(r.start).getTime();
    return aE > rS && aS < Date.now();
  }

  // -------------------------------------------------------------------------
  // actions (CRUD)
  // -------------------------------------------------------------------------
  function pickColor(palette, used) {
    const u = new Set(used);
    return palette.find(c => !u.has(c)) || palette[used.length % palette.length];
  }
  function addPortfolio(name) {
    name = (name || "").trim();
    if (!name) return null;
    const color = pickColor(PORTFOLIO_PALETTE, state.portfolios.map(p => p.color));
    const id = uid();
    state.portfolios.push({ id, name, color });
    highlight(id);
    save();
    return id;
  }
  function renamePortfolio(id, name) {
    const p = portfolioById(id);
    if (!p) return;
    p.name = (name || "").trim() || p.name;
    save();
  }
  function deletePortfolio(id) {
    const p = portfolioById(id);
    if (!p) return;
    const ps = projectsOfPortfolio(id);
    const msg = ps.length
      ? `Delete portfolio "${p.name}" and its ${ps.length} project(s) and all their time? This can't be undone.`
      : `Delete portfolio "${p.name}"?`;
    if (!confirm(msg)) return;
    const projIds = new Set(ps.map(p => p.id));
    const actIds = new Set(state.activities.filter(a => projIds.has(a.projectId)).map(a => a.id));
    state.entries = state.entries.filter(e => !actIds.has(e.activityId));
    state.activities = state.activities.filter(a => !projIds.has(a.projectId));
    state.projects = state.projects.filter(p => p.portfolioId !== id);
    state.portfolios = state.portfolios.filter(p => p.id !== id);
    save();
    if (view.name !== "home") navigate({ name: "home" });
    else render();
  }
  function addProject(portfolioId, fields) {
    if (!portfolioById(portfolioId)) return null;
    const color = pickColor(PROJECT_PALETTE, state.projects.map(p => p.color));
    const id = uid();
    state.projects.push({
      id, portfolioId,
      name: (fields.name || "Untitled project").trim(),
      description: fields.description || "",
      status: fields.status || "active",
      deadline: fields.deadline || null,
      estimatedHours: fields.estimatedHours == null ? null : Number(fields.estimatedHours),
      color,
    });
    highlight(id);
    save();
    return id;
  }
  function updateProject(id, patch) {
    const p = projectById(id);
    if (!p) return;
    Object.assign(p, patch);
    if (patch.estimatedHours === "" || patch.estimatedHours == null) p.estimatedHours = null;
    save();
  }
  function deleteProject(id) {
    const p = projectById(id);
    if (!p) return;
    const acts = activitiesOfProject(id);
    const hasEntries = state.entries.some(e => acts.some(a => a.id === e.activityId));
    const msg = hasEntries
      ? `Delete project "${p.name}" and all its time entries?`
      : `Delete project "${p.name}"?`;
    if (!confirm(msg)) return;
    const actIds = new Set(acts.map(a => a.id));
    state.entries = state.entries.filter(e => !actIds.has(e.activityId));
    state.activities = state.activities.filter(a => a.projectId !== id);
    state.projects = state.projects.filter(p => p.id !== id);
    save();
    if (view.name === "project" && view.id === id) navigate({ name: "portfolio", id: p.portfolioId });
    else render();
  }
  function addActivity(projectId, name) {
    name = (name || "").trim();
    if (!name) return null;
    if (!projectById(projectId)) return null;
    const used = activitiesOfProject(projectId).map(a => a.color);
    const color = pickColor(ACTIVITY_PALETTE, used);
    const id = uid();
    state.activities.push({ id, projectId, name, color });
    highlight(id);
    save();
    return id;
  }
  function renameActivity(id, name) {
    const a = activityById(id);
    if (!a) return;
    a.name = (name || "").trim() || a.name;
    save();
  }
  function deleteActivity(id) {
    const a = activityById(id);
    if (!a) return;
    const has = state.entries.some(e => e.activityId === id);
    const msg = has
      ? `Delete "${a.name}" and its time entries?`
      : `Delete "${a.name}"?`;
    if (!confirm(msg)) return;
    state.entries = state.entries.filter(e => e.activityId !== id);
    state.activities = state.activities.filter(a => a.id !== id);
    save();
    render();
  }
  function startActivity(id) {
    if (!activityById(id)) return;
    const now = new Date().toISOString();
    const r = getRunning();
    if (r) {
      if (r.activityId === id) return;
      r.end = now;
    }
    const eid = uid();
    state.entries.push({ id: eid, activityId: id, start: now, end: null, tags: [] });
    highlight(eid);
    save();
    render();
  }
  function stopRunning() {
    const r = getRunning();
    if (!r) return;
    r.end = new Date().toISOString();
    save();
    render();
  }
  function deleteEntry(id) {
    state.entries = state.entries.filter(e => e.id !== id);
    save();
    render();
  }
  function updateEntry(id, patch) {
    const e = state.entries.find(x => x.id === id);
    if (!e) return { ok: false, err: "Entry not found." };
    const next = { ...e, ...patch };
    if (next.end !== null) {
      const s = new Date(next.start).getTime();
      const en = new Date(next.end).getTime();
      if (!(en >= s)) return { ok: false, err: "End must be at or after start." };
      if (overlapsWithRunning(next, id)) return { ok: false, err: "Conflicts with the running timer." };
    }
    Object.assign(e, patch);
    save();
    render();
    return { ok: true };
  }
  function addManualEntry({ activityId, dateStr, startTime, endTime, tags }) {
    if (!activityById(activityId)) return { ok: false, err: "Pick an activity." };
    if (!dateStr || !startTime || !endTime) return { ok: false, err: "All fields required." };
    const start = combineDateTime(dateStr, startTime);
    const end = combineDateTime(dateStr, endTime);
    if (new Date(end).getTime() < new Date(start).getTime())
      return { ok: false, err: "End must be at or after start." };
    const entry = {
      id: uid(),
      activityId,
      start, end,
      tags: parseTags(tags),
    };
    if (overlapsWithRunning(entry)) return { ok: false, err: "Conflicts with the running timer." };
    state.entries.push(entry);
    highlight(entry.id);
    save();
    render();
    return { ok: true };
  }
  function parseTags(s) {
    if (!s) return [];
    return s.split(",").map(t => t.trim()).filter(Boolean).slice(0, 8);
  }

  // -------------------------------------------------------------------------
  // routing (hash-based)
  // -------------------------------------------------------------------------
  function parseHash() {
    const h = location.hash.replace(/^#\/?/, "");
    if (!h) return { name: "home" };
    if (h === "reports") return { name: "reports" };
    const parts = h.split("/");
    if (parts[0] === "p" && parts[1]) {
      if (parts[2] === "proj" && parts[3]) return { name: "project", id: parts[3], portfolioId: parts[1] };
      return { name: "portfolio", id: parts[1] };
    }
    return { name: "home" };
  }
  function viewHref(v) {
    if (v.name === "home") return "#/";
    if (v.name === "reports") return "#/reports";
    if (v.name === "portfolio") return `#/p/${v.id}`;
    if (v.name === "project") {
      const p = projectById(v.id);
      const pf = p ? p.portfolioId : "_";
      return `#/p/${pf}/proj/${v.id}`;
    }
    return "#/";
  }
  function navigate(v) {
    location.hash = viewHref(v);
  }
  window.addEventListener("hashchange", () => {
    view = parseHash();
    render();
  });

  // -------------------------------------------------------------------------
  // rendering
  // -------------------------------------------------------------------------
  function render() {
    // header bits
    $("todayDate").textContent = fmtDateLong(new Date());
    renderCrumbs();
    renderRunningBar();

    // resolve view, falling back to home if id missing
    if (view.name === "portfolio" && !portfolioById(view.id)) view = { name: "home" };
    if (view.name === "project") {
      const p = projectById(view.id);
      if (!p) view = { name: "home" };
      else view.portfolioId = p.portfolioId;
    }

    const root = $("view");
    const next = document.createElement("div");
    next.className = "view";
    if (view.name === "home") renderHome(next);
    else if (view.name === "reports") renderReportsView(next);
    else if (view.name === "portfolio") renderPortfolioView(next, view.id);
    else if (view.name === "project") renderProjectView(next, view.id);
    swap(root, next);

    // toggle Reports link state
    const rl = $("reportsLink");
    if (rl) rl.classList.toggle("active", view.name === "reports");

    // clear highlight set after this paint; scroll to any new row first
    requestAnimationFrame(() => {
      scrollToHighlighted();
      highlightIds.clear();
    });
  }

  function swap(root, next) {
    const old = root.firstElementChild;
    if (!old) { root.appendChild(next); return; }
    old.classList.add("leaving");
    let replaced = false;
    const finalize = () => {
      if (replaced) return;
      replaced = true;
      old.removeEventListener("animationend", finalize);
      root.replaceChildren(next);
    };
    old.addEventListener("animationend", finalize);
    setTimeout(finalize, 200);
  }

  function renderCrumbs() {
    const el = $("crumbs");
    el.innerHTML = "";
    const parts = [];
    if (view.name === "home") {
      parts.push({ label: "Home", current: true });
    } else if (view.name === "reports") {
      parts.push({ label: "Home", href: "#/" });
      parts.push({ label: "Reports", current: true });
    } else if (view.name === "portfolio") {
      parts.push({ label: "Home", href: "#/" });
      const pf = portfolioById(view.id);
      parts.push({ label: pf ? pf.name : "?", current: true });
    } else if (view.name === "project") {
      const proj = projectById(view.id);
      const pf = proj ? portfolioById(proj.portfolioId) : null;
      parts.push({ label: "Home", href: "#/" });
      if (pf) parts.push({ label: pf.name, href: `#/p/${pf.id}` });
      parts.push({ label: proj ? proj.name : "?", current: true });
    }
    parts.forEach((p, i) => {
      if (i > 0) {
        const sep = document.createElement("span");
        sep.className = "sep";
        sep.textContent = "›";
        el.appendChild(sep);
      }
      if (p.href) {
        const a = document.createElement("a");
        a.href = p.href; a.textContent = p.label;
        el.appendChild(a);
      } else {
        const s = document.createElement("span");
        s.className = "current";
        s.textContent = p.label;
        el.appendChild(s);
      }
    });
  }

  function renderRunningBar() {
    const el = $("runningBar");
    el.innerHTML = "";
    const r = getRunning();
    if (!r) return;
    const a = activityById(r.activityId);
    const proj = a ? projectById(a.projectId) : null;
    const pf = proj ? portfolioById(proj.portfolioId) : null;

    const bar = document.createElement("div");
    bar.className = "running-bar";

    const dot = document.createElement("span");
    dot.className = "pulse-dot";
    if (a) dot.style.background = a.color;

    const label = document.createElement("div");
    label.className = "label";
    if (a && proj) {
      label.innerHTML = `<span>${escapeHtml(a.name)}</span> <span class="sub">· ${escapeHtml(proj.name)}${pf ? " · " + escapeHtml(pf.name) : ""}</span>`;
      label.style.cursor = "pointer";
      label.addEventListener("click", () => navigate({ name: "project", id: proj.id }));
    } else {
      label.textContent = "Running…";
    }

    const live = document.createElement("span");
    live.className = "live";
    live.dataset.live = "1";
    live.dataset.entryId = r.id;
    live.textContent = fmtDuration(Date.now() - new Date(r.start).getTime());

    const stop = document.createElement("button");
    stop.className = "stop-btn";
    stop.textContent = "Stop";
    stop.addEventListener("click", stopRunning);

    bar.append(dot, label, live, stop);
    el.appendChild(bar);
  }

  // -------- Home view (portfolios)
  function renderHome(root) {
    const sec = document.createElement("section");
    const head = document.createElement("div");
    head.className = "section-head";
    head.innerHTML = `<h2>Portfolios</h2><span class="head-meta">${state.portfolios.length} total</span>`;
    sec.appendChild(head);

    const list = document.createElement("div");
    list.className = "card-list";

    if (state.portfolios.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No portfolios yet. Create one to group your projects.";
      sec.appendChild(empty);
    } else {
      const weekStart = startOfWeek(new Date()).getTime();
      const weekEnd = weekStart + 7 * MS_DAY;
      state.portfolios.forEach((p, i) => {
        const projs = projectsOfPortfolio(p.id);
        const weekMs = totalForFilterInRange(e => isActivityInPortfolio(e.activityId, p.id), weekStart, weekEnd);
        const card = makeCard({
          color: p.color,
          title: p.name,
          right: fmtHours(weekMs) + " this week",
          subText: `${projs.length} project${projs.length === 1 ? "" : "s"}`,
          highlightId: p.id,
          delay: i,
          onClick: () => navigate({ name: "portfolio", id: p.id }),
        });
        list.appendChild(card);
      });
      sec.appendChild(list);
    }

    const adder = inlineNameAdder("New portfolio name…", "Add portfolio", (name) => {
      const id = addPortfolio(name);
      if (id) render();
    });
    sec.appendChild(adder);
    root.appendChild(sec);

    // Cross-portfolio week chart, if there's anything to show
    if (state.portfolios.length > 0 && state.activities.length > 0) {
      const chartSec = document.createElement("section");
      const h = document.createElement("h2");
      h.textContent = "This week, by portfolio";
      chartSec.appendChild(h);
      renderWeekChartByPortfolio(chartSec);
      root.appendChild(chartSec);
    }
  }

  // -------- Portfolio view
  function renderPortfolioView(root, portfolioId) {
    const pf = portfolioById(portfolioId);
    if (!pf) return;

    const projs = projectsOfPortfolio(portfolioId);
    const weekStart = startOfWeek(new Date()).getTime();
    const weekEnd = weekStart + 7 * MS_DAY;
    const weekMs = totalForFilterInRange(e => isActivityInPortfolio(e.activityId, pf.id), weekStart, weekEnd);

    // hero
    const hero = document.createElement("div");
    hero.className = "hero";
    const top = document.createElement("div");
    top.className = "hero-top";
    const dot = document.createElement("span");
    dot.className = "dot-lg";
    dot.style.background = pf.color;
    const title = document.createElement("h1");
    title.textContent = pf.name;
    title.title = "Click to rename";
    title.addEventListener("click", () => {
      const next = prompt("Rename portfolio:", pf.name);
      if (next !== null) { renamePortfolio(pf.id, next); render(); }
    });
    const actions = document.createElement("div");
    actions.className = "hero-actions";
    const del = document.createElement("button");
    del.className = "icon-btn danger";
    del.title = "Delete portfolio";
    del.innerHTML = "&times;";
    del.style.fontSize = "1.1rem";
    del.addEventListener("click", () => deletePortfolio(pf.id));
    actions.appendChild(del);
    top.append(dot, title, actions);
    hero.appendChild(top);

    const meta = document.createElement("div");
    meta.className = "meta-row";
    meta.innerHTML = `<span>${projs.length} project${projs.length === 1 ? "" : "s"}</span><span>${fmtHours(weekMs)} this week</span>`;
    hero.appendChild(meta);
    root.appendChild(hero);

    // projects
    const sec = document.createElement("section");
    const head = document.createElement("div");
    head.className = "section-head";
    head.innerHTML = `<h2>Projects</h2>`;
    sec.appendChild(head);

    if (projs.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No projects in this portfolio yet.";
      sec.appendChild(empty);
    } else {
      const list = document.createElement("div");
      list.className = "card-list";
      projs.forEach((proj, i) => list.appendChild(buildProjectCard(proj, i)));
      sec.appendChild(list);
    }

    const adder = inlineProjectAdder(portfolioId, () => render());
    sec.appendChild(adder);
    root.appendChild(sec);

    // weekly chart for this portfolio
    if (projs.length > 0) {
      const chartSec = document.createElement("section");
      const h = document.createElement("h2");
      h.textContent = "This week, by project";
      chartSec.appendChild(h);
      renderWeekChartByProject(chartSec, projs);
      root.appendChild(chartSec);
    }
  }

  function buildProjectCard(proj, idx) {
    const acts = activitiesOfProject(proj.id);
    const actIds = new Set(acts.map(a => a.id));
    const weekStart = startOfWeek(new Date()).getTime();
    const weekEnd = weekStart + 7 * MS_DAY;
    const todayMs = totalForFilterOnDay(e => actIds.has(e.activityId), new Date());
    const weekMs = totalForFilterInRange(e => actIds.has(e.activityId), weekStart, weekEnd);
    const totalMs = totalForFilterInRange(e => actIds.has(e.activityId), 0, Date.now() + MS_DAY);

    const card = document.createElement("button");
    card.type = "button";
    card.className = "card";
    if (highlightIds.has(proj.id)) card.classList.add("new-row");
    card.style.animationDelay = (idx * 30) + "ms";
    card.addEventListener("click", () => navigate({ name: "project", id: proj.id }));

    const top = document.createElement("div");
    top.className = "card-top";
    const dot = document.createElement("span");
    dot.className = "dot"; dot.style.background = proj.color;
    const title = document.createElement("span");
    title.className = "title";
    title.textContent = proj.name;
    const right = document.createElement("span");
    right.className = "right";
    right.textContent = fmtHours(weekMs) + " / wk";
    top.append(dot, title, right);
    card.appendChild(top);

    const sub = document.createElement("div");
    sub.className = "sub";
    const st = STATUS_BY[proj.status] || STATUS_BY.active;
    const badge = document.createElement("span");
    badge.className = "badge " + st.cls;
    badge.innerHTML = `<span class="badge-dot"></span>${st.label}`;
    sub.appendChild(badge);

    if (proj.deadline) {
      const d = daysUntil(proj.deadline);
      const dEl = document.createElement("span");
      if (d < 0) dEl.className = "due-overdue";
      else if (d <= 3) dEl.className = "due-soon";
      dEl.textContent = d < 0
        ? `${Math.abs(d)}d overdue`
        : d === 0 ? "due today" : d === 1 ? "due tomorrow" : `due in ${d}d`;
      sub.appendChild(dEl);
    }
    if (proj.estimatedHours != null) {
      const t = document.createElement("span");
      t.textContent = `${fmtHours(totalMs)} / ${proj.estimatedHours}h`;
      sub.appendChild(t);
    }
    if (todayMs > 0) {
      const t = document.createElement("span");
      t.textContent = `${fmtHours(todayMs)} today`;
      sub.appendChild(t);
    }
    card.appendChild(sub);

    if (proj.estimatedHours != null && proj.estimatedHours > 0) {
      const totalH = totalMs / MS_HOUR;
      const pct = Math.min(100, Math.round((totalH / proj.estimatedHours) * 100));
      const mp = document.createElement("div");
      mp.className = "mini-progress";
      const inner = document.createElement("div");
      inner.style.width = pct + "%";
      if (totalH > proj.estimatedHours) inner.style.background = "var(--warn)";
      mp.appendChild(inner);
      card.appendChild(mp);
    }
    return card;
  }

  // -------- Project view
  function renderProjectView(root, projectId) {
    const proj = projectById(projectId);
    if (!proj) return;
    const pf = portfolioById(proj.portfolioId);
    const acts = activitiesOfProject(projectId);
    const actIds = new Set(acts.map(a => a.id));
    const weekStart = startOfWeek(new Date()).getTime();
    const weekEnd = weekStart + 7 * MS_DAY;
    const totalMs = totalForFilterInRange(e => actIds.has(e.activityId), 0, Date.now() + MS_DAY);

    // hero
    const hero = document.createElement("div");
    hero.className = "hero";
    const top = document.createElement("div");
    top.className = "hero-top";
    const dot = document.createElement("span");
    dot.className = "dot-lg"; dot.style.background = proj.color;
    const title = document.createElement("h1");
    title.textContent = proj.name;
    title.title = "Click to rename";
    title.addEventListener("click", () => {
      const next = prompt("Rename project:", proj.name);
      if (next !== null) { updateProject(proj.id, { name: (next || "").trim() || proj.name }); render(); }
    });
    const actions = document.createElement("div");
    actions.className = "hero-actions";

    const editBtn = document.createElement("button");
    editBtn.className = "icon-btn";
    editBtn.textContent = "Edit";
    editBtn.addEventListener("click", () => openProjectMetaEditor(proj.id, hero));

    const del = document.createElement("button");
    del.className = "icon-btn danger";
    del.title = "Delete project";
    del.innerHTML = "&times;";
    del.style.fontSize = "1.1rem";
    del.addEventListener("click", () => deleteProject(proj.id));

    actions.append(editBtn, del);
    top.append(dot, title, actions);
    hero.appendChild(top);

    const meta = document.createElement("div");
    meta.className = "meta-row";
    const st = STATUS_BY[proj.status] || STATUS_BY.active;
    const badge = document.createElement("span");
    badge.className = "badge " + st.cls;
    badge.innerHTML = `<span class="badge-dot"></span>${st.label}`;
    meta.appendChild(badge);
    if (proj.deadline) {
      const d = daysUntil(proj.deadline);
      const dEl = document.createElement("span");
      if (d < 0) dEl.className = "due-overdue";
      else if (d <= 3) dEl.className = "due-soon";
      dEl.textContent = `Due ${fmtDateShort(proj.deadline)}` +
        (d < 0 ? ` · ${Math.abs(d)}d overdue` : d === 0 ? " · today" : ` · in ${d}d`);
      meta.appendChild(dEl);
    }
    const t = document.createElement("span");
    t.textContent = proj.estimatedHours != null
      ? `${fmtHours(totalMs)} of ${proj.estimatedHours}h`
      : `${fmtHours(totalMs)} total`;
    meta.appendChild(t);
    hero.appendChild(meta);

    if (proj.description) {
      const d = document.createElement("div");
      d.className = "desc";
      d.textContent = proj.description;
      hero.appendChild(d);
    } else {
      const d = document.createElement("div");
      d.className = "desc empty-desc";
      d.textContent = "Add a description…";
      d.addEventListener("click", () => openProjectMetaEditor(proj.id, hero));
      hero.appendChild(d);
    }

    if (proj.estimatedHours != null && proj.estimatedHours > 0) {
      const totalH = totalMs / MS_HOUR;
      const pct = Math.min(100, Math.round((totalH / proj.estimatedHours) * 100));
      const wrap = document.createElement("div");
      wrap.className = "progress-wrap";
      wrap.innerHTML = `
        <div class="progress-meta">
          <span>${fmtHours(totalMs)} of ${proj.estimatedHours}h</span>
          <span>${pct}%</span>
        </div>`;
      const bar = document.createElement("div");
      bar.className = "progress" + (totalH > proj.estimatedHours ? " over" : "");
      const inner = document.createElement("div");
      requestAnimationFrame(() => { inner.style.width = pct + "%"; });
      bar.appendChild(inner);
      wrap.appendChild(bar);
      hero.appendChild(wrap);
    }
    root.appendChild(hero);

    // Activities
    const actSec = document.createElement("section");
    const actHead = document.createElement("div");
    actHead.className = "section-head";
    actHead.innerHTML = `<h2>Activities</h2>`;
    actSec.appendChild(actHead);

    const actList = document.createElement("div");
    if (acts.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No activities yet — add one to start tracking time on this project.";
      actSec.appendChild(empty);
    } else {
      const running = getRunning();
      acts.forEach((a, i) => actList.appendChild(buildActivityRow(a, running, i)));
      actSec.appendChild(actList);
    }
    const actAdder = inlineNameAdder("New activity name…", "Add", (name) => {
      const id = addActivity(proj.id, name);
      if (id) render();
    });
    actSec.appendChild(actAdder);
    root.appendChild(actSec);

    // Today's entries (this project)
    const entSec = document.createElement("section");
    const entHead = document.createElement("div");
    entHead.className = "section-head";
    entHead.innerHTML = `<h2>Today's entries</h2>`;
    entSec.appendChild(entHead);

    const entList = document.createElement("div");
    const todays = entriesOnDay(new Date(), e => actIds.has(e.activityId));
    if (todays.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No entries today yet.";
      entSec.appendChild(empty);
    } else {

  // -------- week charts
  function weekDays() {
    const ws = startOfWeek(new Date());
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(ws); d.setDate(ws.getDate() + i); return d;
    });
  }

  function renderWeekChartByPortfolio(parent) {
    const days = weekDays();
    const items = state.portfolios.map(p => {
      const dayMs = days.map(d => totalForFilterOnDay(e => isActivityInPortfolio(e.activityId, p.id), d));
      const weekMs = dayMs.reduce((s, x) => s + x, 0);
      return { color: p.color, name: p.name, dayMs, weekMs, onClick: () => navigate({ name: "portfolio", id: p.id }) };
    });
    drawWeekChart(parent, items);
  }
  function renderWeekChartByProject(parent, projs) {
    const days = weekDays();
    const items = projs.map(p => {
      const actIds = new Set(activitiesOfProject(p.id).map(a => a.id));
      const dayMs = days.map(d => totalForFilterOnDay(e => actIds.has(e.activityId), d));
      const weekMs = dayMs.reduce((s, x) => s + x, 0);
      return { color: p.color, name: p.name, dayMs, weekMs, onClick: () => navigate({ name: "project", id: p.id }) };
    });
    drawWeekChart(parent, items);
  }
  function renderWeekChartByActivity(parent, acts) {
    const days = weekDays();
    const items = acts.map(a => {
      const dayMs = days.map(d => totalForFilterOnDay(e => e.activityId === a.id, d));
      const weekMs = dayMs.reduce((s, x) => s + x, 0);
      return { color: a.color, name: a.name, dayMs, weekMs };
    });
    drawWeekChart(parent, items);
  }
  function drawWeekChart(parent, items) {
    // axis
    const header = document.createElement("div");
    header.className = "week-grid";
    const sp1 = document.createElement("div");
    const axis = document.createElement("div");
    axis.className = "axis";
    const dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
    const todayMs = startOfDay(new Date()).getTime();
    const ds = weekDays();
    ds.forEach((d, i) => {
      const cell = document.createElement("div");
      cell.textContent = dayNames[i];
      if (d.getTime() === todayMs) cell.classList.add("today-cell");
      axis.appendChild(cell);
    });
    const sp2 = document.createElement("div");
    sp2.className = "week-label";
    sp2.textContent = "Week";
    header.append(sp1, axis, sp2);
    parent.appendChild(header);

    let max = 1;
    for (const it of items) for (const v of it.dayMs) if (v > max) max = v;

    items.forEach((it, idx) => {
      const row = document.createElement("div");
      row.className = "week-row";
      row.style.animationDelay = (idx * 30) + "ms";
      if (it.onClick) { row.style.cursor = "pointer"; row.addEventListener("click", it.onClick); }

      const dot = document.createElement("span");
      dot.className = "dot"; dot.style.background = it.color;

      const center = document.createElement("div");
      const name = document.createElement("div");
      name.className = "name"; name.textContent = it.name;
      const bars = document.createElement("div");
      bars.className = "bars";
      it.dayMs.forEach((ms) => {
        const col = document.createElement("div");
        col.className = "bar-col";
        const bar = document.createElement("div");
        bar.className = "bar";
        bar.style.background = it.color;
        bar.title = fmtHours(ms);
        if (ms <= 0) {
          bar.classList.add("zero");
        } else {
          const pct = Math.max(6, Math.round((ms / max) * 100));
          requestAnimationFrame(() => { bar.style.height = pct + "%"; });
        }
        col.appendChild(bar);
        bars.appendChild(col);
      });
      center.append(name, bars);

      const total = document.createElement("div");
      total.className = "total";
      total.textContent = fmtHours(it.weekMs);

      row.append(dot, center, total);
      parent.appendChild(row);
    });
  }

  // -------------------------------------------------------------------------
  // misc helpers
  // -------------------------------------------------------------------------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  // -------------------------------------------------------------------------
  // reports view
  // -------------------------------------------------------------------------
  const reportsState = { range: "7d", portfolioId: "" };

  function rangeBounds(key) {
    const now = new Date();
    const dayEnd = startOfDay(now).getTime() + MS_DAY;
    if (key === "7d") {
      const from = startOfDay(new Date(now.getTime() - 6 * MS_DAY)).getTime();
      return { from, to: dayEnd, days: 7, label: "Last 7 days" };
    }
    if (key === "30d") {
      const from = startOfDay(new Date(now.getTime() - 29 * MS_DAY)).getTime();
      return { from, to: dayEnd, days: 30, label: "Last 30 days" };
    }
    if (key === "month") {
      const from = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
      const days = Math.max(1, Math.ceil((dayEnd - from) / MS_DAY));
      return { from, to: dayEnd, days, label: now.toLocaleDateString(undefined, { month: "long", year: "numeric" }) };
    }
    // all time
    let minStart = dayEnd - MS_DAY;
    for (const e of state.entries) {
      const t = new Date(e.start).getTime();
      if (t < minStart) minStart = t;
    }
    const from = startOfDay(new Date(minStart)).getTime();
    const days = Math.max(1, Math.ceil((dayEnd - from) / MS_DAY));
    return { from, to: dayEnd, days, label: "All time" };
  }

  function reportEntryFilter() {
    const pid = reportsState.portfolioId;
    if (!pid) return () => true;
    return (e) => isActivityInPortfolio(e.activityId, pid);
  }

  function entryDurationClipped(e, fromMs, toMs) {
    const s = new Date(e.start).getTime();
    const en = e.end ? new Date(e.end).getTime() : Date.now();
    const cS = Math.max(s, fromMs);
    const cE = Math.min(en, toMs);
    return cE > cS ? cE - cS : 0;
  }

  function renderReportsView(root) {
    if (reportsState.portfolioId && !portfolioById(reportsState.portfolioId)) reportsState.portfolioId = "";
    const bounds = rangeBounds(reportsState.range);
    const filt = reportEntryFilter();
    const totalMs = totalForFilterInRange(filt, bounds.from, bounds.to);
    const entries = state.entries.filter(e => {
      if (!filt(e)) return false;
      const s = new Date(e.start).getTime();
      return s >= bounds.from && s < bounds.to;
    });
    const dayKeys = new Set(entries.map(e => startOfDay(new Date(e.start)).toDateString()));

    // hero
    const hero = document.createElement("div");
    hero.className = "hero";
    const top = document.createElement("div");
    top.className = "hero-top";
    const title = document.createElement("h1");
    title.textContent = "Reports";
    title.style.cursor = "default";
    title.style.flex = "1";
    top.appendChild(title);
    hero.appendChild(top);

    const meta = document.createElement("div");
    meta.className = "meta-row";
    meta.innerHTML = `<span>${escapeHtml(bounds.label)}</span><span>${entries.length} entr${entries.length === 1 ? "y" : "ies"}</span><span>${fmtHours(totalMs)} total</span>`;
    hero.appendChild(meta);

    // range chips
    const chips = document.createElement("div");
    chips.className = "range-row";
    [["7d","7 days"],["30d","30 days"],["month","This month"],["all","All time"]].forEach(([k, label]) => {
      const b = document.createElement("button");
      b.className = "chip-btn" + (reportsState.range === k ? " active" : "");
      b.textContent = label;
      b.addEventListener("click", () => { reportsState.range = k; render(); });
      chips.appendChild(b);
    });
    hero.appendChild(chips);

    // portfolio filter
    if (state.portfolios.length > 0) {
      const filtRow = document.createElement("div");
      filtRow.className = "filter-row";
      const lbl = document.createElement("span");
      lbl.className = "lbl";
      lbl.textContent = "Portfolio:";
      const sel = document.createElement("select");
      const optAll = document.createElement("option");
      optAll.value = ""; optAll.textContent = "All portfolios";
      sel.appendChild(optAll);
      for (const pf of state.portfolios) {
        const o = document.createElement("option");
        o.value = pf.id; o.textContent = pf.name;
        if (pf.id === reportsState.portfolioId) o.selected = true;
        sel.appendChild(o);
      }
      sel.addEventListener("change", () => { reportsState.portfolioId = sel.value; render(); });
      filtRow.append(lbl, sel);
      hero.appendChild(filtRow);
    }
    root.appendChild(hero);

    // KPI cards
    const allActsInRange = new Map();
    for (const e of entries) {
      const ms = entryDurationClipped(e, bounds.from, bounds.to);
      allActsInRange.set(e.activityId, (allActsInRange.get(e.activityId) || 0) + ms);
    }
    let topActivity = null, topActMs = 0;
    for (const [aid, ms] of allActsInRange.entries()) {
      if (ms > topActMs) { topActMs = ms; topActivity = activityById(aid); }
    }

    const kpiSec = document.createElement("section");
    const kpiGrid = document.createElement("div");
    kpiGrid.className = "stat-grid";
    appendStatCard(kpiGrid, "Total time", fmtHours(totalMs), entries.length + " entr" + (entries.length === 1 ? "y" : "ies"));
    appendStatCard(kpiGrid, "Days active", String(dayKeys.size), bounds.days + " day" + (bounds.days === 1 ? "" : "s") + " in range");
    appendStatCard(kpiGrid, "Daily avg", dayKeys.size > 0 ? fmtHours(totalMs / dayKeys.size) : "0h", "on tracked days");
    appendStatCard(kpiGrid, "Top activity", topActivity ? topActivity.name : "—", topActivity ? fmtHours(topActMs) : "no data");
    kpiSec.appendChild(kpiGrid);
    root.appendChild(kpiSec);

    // daily bars
    if (bounds.days > 0) {
      const chartSec = document.createElement("section");
      const h = document.createElement("h2");
      h.textContent = "Daily hours";
      chartSec.appendChild(h);
      renderDailyChart(chartSec, bounds, filt);
      root.appendChild(chartSec);
    }

    // by activity
    if (allActsInRange.size > 0) {
      const sec = document.createElement("section");
      const h = document.createElement("h2");
      h.textContent = "By activity";
      sec.appendChild(h);
      const items = [...allActsInRange.entries()]
        .map(([aid, ms]) => ({ a: activityById(aid), ms }))
        .filter(x => x.a)
        .sort((a, b) => b.ms - a.ms)
        .slice(0, 10);
      const maxMs = items[0]?.ms || 1;
      renderHorizontalBars(sec, items.map(it => ({
        color: it.a.color, label: it.a.name, value: fmtHours(it.ms),
        pct: Math.round((it.ms / maxMs) * 100),
        onClick: () => { const p = projectById(it.a.projectId); if (p) navigate({ name: "project", id: p.id }); }
      })));
      root.appendChild(sec);
    }

    // by project
    const projTotals = new Map();
    for (const e of entries) {
      const a = activityById(e.activityId);
      if (!a) continue;
      projTotals.set(a.projectId, (projTotals.get(a.projectId) || 0) + entryDurationClipped(e, bounds.from, bounds.to));
    }
    if (projTotals.size > 0) {
      const sec = document.createElement("section");
      const h = document.createElement("h2");
      h.textContent = "By project";
      sec.appendChild(h);
      const items = [...projTotals.entries()]
        .map(([pid, ms]) => ({ p: projectById(pid), ms }))
        .filter(x => x.p)
        .sort((a, b) => b.ms - a.ms)
        .slice(0, 10);
      const maxMs = items[0]?.ms || 1;
      renderHorizontalBars(sec, items.map(it => ({
        color: it.p.color, label: it.p.name, value: fmtHours(it.ms),
        pct: Math.round((it.ms / maxMs) * 100),
        onClick: () => navigate({ name: "project", id: it.p.id }),
      })));
      root.appendChild(sec);
    }

    // project status donut
    const inScopeProjects = reportsState.portfolioId
      ? projectsOfPortfolio(reportsState.portfolioId)
      : state.projects;
    if (inScopeProjects.length > 0) {
      const sec = document.createElement("section");
      const h = document.createElement("h2");
      h.textContent = "Project status";
      sec.appendChild(h);
      renderStatusDonut(sec, inScopeProjects);
      root.appendChild(sec);
    }

    // top tags
    const tagMs = new Map();
    for (const e of entries) {
      const ms = entryDurationClipped(e, bounds.from, bounds.to);
      for (const t of (e.tags || [])) tagMs.set(t, (tagMs.get(t) || 0) + ms);
    }
    if (tagMs.size > 0) {
      const sec = document.createElement("section");
      const h = document.createElement("h2");
      h.textContent = "Top tags";
      sec.appendChild(h);
      const cloud = document.createElement("div");
      cloud.className = "cloud";
      [...tagMs.entries()].sort((a, b) => b[1] - a[1]).slice(0, 20).forEach(([t, ms], idx) => {
        const c = document.createElement("span");
        c.className = "chip";
        c.style.animationDelay = (idx * 18) + "ms";
        c.textContent = `#${t} · ${fmtHours(ms)}`;
        cloud.appendChild(c);
      });
      sec.appendChild(cloud);
      root.appendChild(sec);
    }

    // export & import
    const exSec = document.createElement("section");
    const h = document.createElement("h2");
    h.textContent = "Export & import";
    exSec.appendChild(h);
    const row = document.createElement("div");
    row.className = "export-row";

    const bJson = document.createElement("button");
    bJson.className = "file-btn";
    bJson.textContent = "Export JSON (full backup)";
    bJson.addEventListener("click", () => exportJson());

    const bCsv = document.createElement("button");
    bCsv.className = "file-btn";
    bCsv.textContent = "Export CSV (range)";
    bCsv.addEventListener("click", () => exportCsv(bounds, filt));

    const bMd = document.createElement("button");
    bMd.className = "file-btn";
    bMd.textContent = "Export Markdown (range)";
    bMd.addEventListener("click", () => exportMarkdown(bounds, filt, entries));

    const importLabel = document.createElement("label");
    importLabel.className = "file-btn";
    importLabel.textContent = "Import JSON…";
    const fileInp = document.createElement("input");
    fileInp.type = "file";
    fileInp.accept = "application/json,.json";
    fileInp.style.display = "none";
    fileInp.addEventListener("change", () => {
      if (fileInp.files[0]) importJsonFile(fileInp.files[0]);
      fileInp.value = "";
    });
    importLabel.appendChild(fileInp);

    row.append(bJson, bCsv, bMd, importLabel);
    exSec.appendChild(row);
    const note = document.createElement("div");
    note.className = "empty";
    note.innerHTML = `JSON is a full backup of everything. CSV and Markdown are scoped to the current filter and date range.`;
    exSec.appendChild(note);
    root.appendChild(exSec);

    // empty-state hint when nothing recorded
    if (entries.length === 0) {
      const hint = document.createElement("section");
      const inner = document.createElement("div");
      inner.className = "empty";
      inner.textContent = "No time recorded in this range yet.";
      hint.appendChild(inner);
      root.insertBefore(hint, kpiSec.nextSibling);
    }
  }

  function appendStatCard(parent, label, value, sub) {
    const c = document.createElement("div");
    c.className = "stat-card";
    const l = document.createElement("div"); l.className = "label"; l.textContent = label;
    const v = document.createElement("div"); v.className = "value"; v.textContent = value;
    const s = document.createElement("div"); s.className = "sub"; s.textContent = sub || "";
    c.append(l, v, s);
    parent.appendChild(c);

  function renderHorizontalBars(parent, items) {
    const list = document.createElement("div");
    list.className = "hbar-list";
    items.forEach((it, idx) => {
      const row = document.createElement("div");
      row.className = "hbar";
      row.style.animationDelay = (idx * 30) + "ms";
      if (it.onClick) { row.style.cursor = "pointer"; row.addEventListener("click", it.onClick); }
      const dot = document.createElement("span");
      dot.className = "dot"; dot.style.background = it.color;
      const middle = document.createElement("div");
      const lbl = document.createElement("div");
      lbl.className = "label"; lbl.textContent = it.label;
      const wrap = document.createElement("div");
      wrap.className = "bar-wrap";
      const bar = document.createElement("div");
      bar.className = "bar";
      bar.style.background = it.color;
      requestAnimationFrame(() => { bar.style.width = it.pct + "%"; });
      wrap.appendChild(bar);
      middle.append(lbl, wrap);
      const val = document.createElement("div");
      val.className = "value"; val.textContent = it.value;
      row.append(dot, middle, val);
      list.appendChild(row);
    });
    parent.appendChild(list);
  }

  function renderDailyChart(parent, bounds, filt) {
    const days = [];
    for (let t = bounds.from; t < bounds.to; t += MS_DAY) {
      const dStart = t;
      const dEnd = Math.min(t + MS_DAY, bounds.to);
      const ms = totalForFilterInRange(filt, dStart, dEnd);
      days.push({ date: new Date(dStart), ms });
    }
    let max = 1;
    for (const d of days) if (d.ms > max) max = d.ms;

    const chart = document.createElement("div");
    chart.className = "daily-chart";
    chart.style.setProperty("--cols", days.length);
    const todayKey = startOfDay(new Date()).toDateString();
    days.forEach((d) => {
      const bar = document.createElement("div");
      bar.className = "bar";
      bar.title = `${d.date.toLocaleDateString(undefined, { month: "short", day: "numeric" })} · ${fmtHours(d.ms)}`;
      if (d.date.toDateString() === todayKey) bar.classList.add("today-bar");
      if (d.ms <= 0) {
        bar.classList.add("zero");
      } else {
        const pct = Math.max(6, Math.round((d.ms / max) * 100));
        requestAnimationFrame(() => { bar.style.height = pct + "%"; });
      }
      chart.appendChild(bar);
    });
    parent.appendChild(chart);

    const axis = document.createElement("div");
    axis.className = "daily-axis";
    if (days.length > 0) {
      const left = document.createElement("span");
      left.textContent = days[0].date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      const right = document.createElement("span");
      right.textContent = days[days.length - 1].date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      axis.append(left, right);
    }
    parent.appendChild(axis);
  }

  function renderStatusDonut(parent, projects) {
    const counts = { planning: 0, active: 0, "on-hold": 0, done: 0 };
    for (const p of projects) {
      const k = p.status || "active";
      counts[k] = (counts[k] || 0) + 1;
    }
    const total = projects.length;
    const colorOf = { planning: "#9ca3af", active: "#16a34a", "on-hold": "#ca8a04", done: "#6b7280" };

    const row = document.createElement("div");
    row.className = "donut-row";

    const ns = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(ns, "svg");
    svg.setAttribute("class", "donut");
    svg.setAttribute("viewBox", "0 0 100 100");
    const cx = 50, cy = 50, r = 40;
    const circ = 2 * Math.PI * r;
    const track = document.createElementNS(ns, "circle");
    track.setAttribute("class", "track");
    track.setAttribute("cx", cx); track.setAttribute("cy", cy); track.setAttribute("r", r);
    svg.appendChild(track);

    let offset = 0;
    for (const s of STATUSES) {
      const c = counts[s.value] || 0;
      if (c === 0 || total === 0) continue;
      const frac = c / total;
      const slice = document.createElementNS(ns, "circle");
      slice.setAttribute("class", "slice");
      slice.setAttribute("cx", cx); slice.setAttribute("cy", cy); slice.setAttribute("r", r);
      slice.setAttribute("stroke", colorOf[s.value]);
      slice.setAttribute("stroke-dasharray", `0 ${circ}`);
      slice.setAttribute("stroke-dashoffset", -offset);
      svg.appendChild(slice);
      const targetDash = `${frac * circ} ${circ}`;
      requestAnimationFrame(() => slice.setAttribute("stroke-dasharray", targetDash));
      offset += frac * circ;
    }
    row.appendChild(svg);

    const legend = document.createElement("div");
    legend.className = "donut-legend";
    for (const s of STATUSES) {
      const c = counts[s.value] || 0;
      const item = document.createElement("div");
      item.className = "item";
      const sw = document.createElement("span");
      sw.className = "swatch"; sw.style.background = colorOf[s.value];
      const lbl = document.createElement("span");
      lbl.textContent = `${s.label} · ${c}`;
      const pct = document.createElement("span");
      pct.className = "pct";
      pct.textContent = total > 0 ? `${Math.round((c / total) * 100)}%` : "0%";
      item.append(sw, lbl, pct);
      legend.appendChild(item);
    }
    row.appendChild(legend);
    parent.appendChild(row);
  }

  // -------------------------------------------------------------------------
  // export / import
  // -------------------------------------------------------------------------
  function download(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  function dateStampForFile() {
    const d = new Date();
    return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}`;
  }
  function exportJson() {
    const data = JSON.stringify(state, null, 2);
    download(new Blob([data], { type: "application/json" }), `timeplanner-backup-${dateStampForFile()}.json`);
    toast("Exported JSON backup");
  }
  function csvQuote(s) {
    s = String(s == null ? "" : s);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }
  function exportCsv(bounds, filt) {
    const rows = [["start","end","duration_hours","activity","project","portfolio","tags"]];
    const inRange = state.entries.filter(e => {
      if (filt && !filt(e)) return false;
      const s = new Date(e.start).getTime();
      return s >= bounds.from && s < bounds.to;
    }).sort((a, b) => new Date(a.start) - new Date(b.start));
    for (const e of inRange) {
      const a = activityById(e.activityId);
      const proj = a ? projectById(a.projectId) : null;
      const pf = proj ? portfolioById(proj.portfolioId) : null;
      const endIso = e.end || new Date().toISOString();
      const durH = ((new Date(endIso) - new Date(e.start)) / MS_HOUR).toFixed(2);
      rows.push([
        e.start, endIso, durH,
        a ? a.name : "(deleted)",
        proj ? proj.name : "(deleted)",
        pf ? pf.name : "(deleted)",
        (e.tags || []).join("; "),
      ]);
    }
    const text = rows.map(r => r.map(csvQuote).join(",")).join("\n");
    download(new Blob([text], { type: "text/csv" }), `timeplanner-entries-${dateStampForFile()}.csv`);
    toast(`Exported ${inRange.length} entr${inRange.length === 1 ? "y" : "ies"}`);
  }
  function exportMarkdown(bounds, filt, entries) {
    const lines = [];
    lines.push(`# TimePlanner.AI — ${bounds.label}`);
    const totalMs = entries.reduce((s, e) => s + entryDurationClipped(e, bounds.from, bounds.to), 0);
    const dayKeys = new Set(entries.map(e => startOfDay(new Date(e.start)).toDateString()));
    lines.push("");
    lines.push(`**Total time:** ${fmtHours(totalMs)} across ${entries.length} entries · ${dayKeys.size} active day${dayKeys.size === 1 ? "" : "s"}`);

    function bucket(keyFn, nameFn) {
      const m = new Map();
      for (const e of entries) {
        const k = keyFn(e); if (k == null) continue;
        m.set(k, (m.get(k) || 0) + entryDurationClipped(e, bounds.from, bounds.to));
      }
      return [...m.entries()]
        .sort((a, b) => b[1] - a[1])
        .map(([k, ms]) => `- ${nameFn(k)} — ${fmtHours(ms)}`);
    }

    const byPort = bucket(
      e => { const a = activityById(e.activityId); if (!a) return null; const p = projectById(a.projectId); return p ? p.portfolioId : null; },
      id => (portfolioById(id)?.name) || "(unknown)"
    );
    if (byPort.length) { lines.push("", "## By Portfolio", ...byPort); }
    const byProj = bucket(
      e => { const a = activityById(e.activityId); return a ? a.projectId : null; },
      id => (projectById(id)?.name) || "(unknown)"
    );
    if (byProj.length) { lines.push("", "## By Project", ...byProj); }
    const byAct = bucket(
      e => e.activityId,
      id => (activityById(id)?.name) || "(unknown)"
    );
    if (byAct.length) { lines.push("", "## By Activity", ...byAct); }

    const tagMs = new Map();
    for (const e of entries) {
      const ms = entryDurationClipped(e, bounds.from, bounds.to);
      for (const t of (e.tags || [])) tagMs.set(t, (tagMs.get(t) || 0) + ms);
    }
    if (tagMs.size) {
      const tags = [...tagMs.entries()].sort((a, b) => b[1] - a[1]).map(([t, ms]) => `- #${t} — ${fmtHours(ms)}`);
      lines.push("", "## By Tag", ...tags);
    }

    const inScope = reportsState.portfolioId ? projectsOfPortfolio(reportsState.portfolioId) : state.projects;
    if (inScope.length) {
      const counts = { planning: 0, active: 0, "on-hold": 0, done: 0 };
      for (const p of inScope) counts[p.status || "active"] = (counts[p.status || "active"] || 0) + 1;
      const parts = STATUSES.map(s => `${counts[s.value] || 0} ${s.label}`).join(" · ");
      lines.push("", "## Project Status", `- ${parts}`);
    }

    lines.push("", `_Generated ${new Date().toLocaleString()}_`);
    download(new Blob([lines.join("\n")], { type: "text/markdown" }), `timeplanner-report-${dateStampForFile()}.md`);
    toast("Exported Markdown report");
  }
  function importJsonFile(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      let parsed;
      try { parsed = JSON.parse(ev.target.result); }
      catch { toast("Couldn't parse JSON file"); return; }
      if (!parsed || typeof parsed !== "object" ||
          !Array.isArray(parsed.portfolios) ||
          !Array.isArray(parsed.projects) ||
          !Array.isArray(parsed.activities) ||
          !Array.isArray(parsed.entries)) {
        toast("Not a TimePlanner backup");
        return;
      }
      if (!confirm("Replace all current data with the imported file? This can't be undone.")) return;
      state = parsed;
      for (const e of state.entries) if (!Array.isArray(e.tags)) e.tags = [];
      save();
      render();
      toast("Imported backup");
    };
    reader.readAsText(file);
  }
